<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#1a3a2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="EBD Jovens"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<title>EBD Jovens</title>
<style>
:root {
  --g0: #0d2018;
  --g1: #1a3a2a;
  --g2: #1a6b3a;
  --g3: #2d9c5a;
  --g4: #7abf8a;
  --g5: #b8e6c8;
  --g6: #e8f5ec;
  --surface: #ffffff;
  --surface2: #f5f7f5;
  --surface3: #eef2ef;
  --text1: #0d1f15;
  --text2: #3d5a47;
  --text3: #7a9885;
  --border: rgba(26,58,42,0.12);
  --border2: rgba(26,58,42,0.2);
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(13,32,24,0.08);
  --shadow-lg: 0 8px 32px rgba(13,32,24,0.12);
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --gold: #d4a017;
  --silver: #8c9aab;
  --bronze: #9c6b3a;
  --danger: #c0392b;
  --danger-light: #fdf0ef;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--surface2)}
body{font-family:var(--font);color:var(--text1);display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* ── Header ── */
.header{background:var(--g1);padding:env(safe-area-inset-top,0) 0 0;flex-shrink:0}
.header-inner{padding:14px 16px 14px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.header p{font-size:11px;color:var(--g4);margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.trimester-badge{background:rgba(255,255,255,0.12);color:var(--g5);font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}

/* ── Tabs ── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-shrink:0}
.tab{flex:1;padding:11px 4px 9px;border:none;background:transparent;cursor:pointer;font-size:10px;font-family:var(--font);color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:color .15s;font-weight:500;letter-spacing:0.3px}
.tab.active{color:var(--g2)}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--g2);border-radius:2px 2px 0 0}
.tab-icon{font-size:19px;line-height:1}

/* ── Screens ── */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;background:var(--surface2);padding-bottom:16px}
.screen.active{display:block}

/* ── Summary bar ── */
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 12px 0}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center}
.summary-card .val{font-size:22px;font-weight:600;color:var(--g2);line-height:1.2}
.summary-card .lbl{font-size:10px;color:var(--text3);margin-top:2px;font-weight:500;letter-spacing:0.4px;text-transform:uppercase}

/* ── Section label ── */
.section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:14px 16px 6px}

/* ── Ranking cards ── */
.rank-list{display:flex;flex-direction:column;gap:6px;padding:0 12px}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:default;transition:border-color .15s}
.rank-card:hover{border-color:var(--border2)}
.rank-card.rank-1{border-left:3px solid var(--gold)}
.rank-card.rank-2{border-left:3px solid var(--silver)}
.rank-card.rank-3{border-left:3px solid var(--bronze)}
.rank-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.rank-badge.b1{background:#fff8e0;color:var(--gold)}
.rank-badge.b2{background:#f0f2f4;color:var(--silver)}
.rank-badge.b3{background:#fdf0e6;color:var(--bronze)}
.rank-badge.bn{background:var(--surface3);color:var(--text3);font-size:12px}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:14px;font-weight:600;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar-bg{height:3px;background:var(--g6);border-radius:2px;margin-top:5px}
.rank-bar{height:3px;background:var(--g3);border-radius:2px;transition:width .5s ease}
.rank-actions{font-size:11px;color:var(--text3);margin-top:2px}
.rank-score{font-size:22px;font-weight:600;color:var(--g2);flex-shrink:0}

/* ── FAB ── */
.fab{position:sticky;bottom:16px;margin:12px 12px 0;background:var(--g2);color:#fff;border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);width:calc(100% - 24px);transition:background .15s;box-shadow:var(--shadow-lg)}
.fab:active{background:var(--g1);transform:scale(0.98)}

/* ── Add Points screen ── */
.young-section{padding:0 12px}
.young-btn{width:100%;margin-bottom:6px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:var(--font);font-size:14px;font-weight:500;color:var(--text1);transition:all .12s}
.young-btn:hover{border-color:var(--border2)}
.young-btn.selected{background:var(--g2);border-color:var(--g2);color:#fff}
.young-btn .pts-badge{font-size:12px;opacity:0.7;font-weight:400}
.action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 12px}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .12s;min-height:96px;justify-content:center}
.action-card:hover{border-color:var(--g3);background:var(--g6)}
.action-card:active{transform:scale(0.95)}
.action-card.disabled{opacity:0.45;cursor:default;pointer-events:none}
.action-card .a-icon{font-size:26px;line-height:1}
.action-card .a-name{font-size:11px;font-weight:600;color:var(--text1);text-align:center}
.action-card .a-pts{font-size:11px;font-weight:500;color:var(--g2)}
.hint-text{text-align:center;padding:12px 16px;font-size:12px;color:var(--text3)}

/* ── Toast ── */
.toast{margin:8px 12px 0;background:var(--g0);color:var(--g4);border-radius:var(--radius);padding:12px 16px;font-size:13px;font-weight:500;display:none;align-items:center;gap:8px;animation:slideDown .2s ease}
.toast.show{display:flex}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── History table ── */
.hist-controls{display:flex;gap:8px;padding:0 12px;align-items:center}
.hist-filter{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;background:var(--surface);color:var(--text1);outline:none}
.hist-filter:focus{border-color:var(--g3)}
.export-btn{padding:8px 14px;background:var(--g2);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.export-btn:active{background:var(--g1)}
.table-wrap{padding:0 12px;margin-top:8px;overflow-x:auto}
.hist-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.hist-table thead{background:var(--g1);color:#fff}
.hist-table th{padding:9px 10px;text-align:left;font-size:11px;font-weight:600;letter-spacing:0.4px;white-space:nowrap}
.hist-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text1);white-space:nowrap}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:var(--g6)}
.hist-table .pts-cell{font-weight:600;color:var(--g2);font-family:var(--mono)}
.hist-table .time-cell{color:var(--text3);font-family:var(--mono);font-size:11px}
.empty-state{text-align:center;padding:48px 16px;color:var(--text3)}
.empty-state .e-icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:14px}
.empty-state small{font-size:12px;opacity:0.7}

/* ── Config screen ── */
.config-section{margin:0 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.config-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);gap:10px}
.config-row:last-child{border-bottom:none}
.config-row .cr-icon{font-size:20px;flex-shrink:0}
.config-row .cr-label{flex:1;font-size:14px;font-weight:500;color:var(--text1)}
.pts-input{width:64px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:var(--mono);font-size:14px;font-weight:500;color:var(--g2);text-align:center;outline:none}
.pts-input:focus{border-color:var(--g2)}
.youth-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:8px}
.youth-row:last-child{border-bottom:none}
.youth-row .yr-name{flex:1;font-size:14px;font-weight:500}
.youth-row .yr-pts{font-size:12px;color:var(--g2);font-family:var(--mono)}
.del-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .12s}
.del-btn:hover{background:var(--danger-light);color:var(--danger)}
.add-row{display:flex;gap:8px;padding:8px 12px 0}
.add-input{flex:1;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text1);outline:none;background:var(--surface)}
.add-input:focus{border-color:var(--g2)}
.add-btn{padding:10px 16px;background:var(--g2);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.add-btn:active{background:var(--g1)}
.reset-btn{margin:8px 12px 0;width:calc(100% - 24px);padding:12px;border:1px solid rgba(192,57,43,0.3);border-radius:var(--radius);background:none;color:var(--danger);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s}
.reset-btn:hover{background:var(--danger-light)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-overlay.show{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:100%;max-width:320px;box-shadow:var(--shadow-lg)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-cancel{padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:none;font-family:var(--font);font-size:13px;cursor:pointer;color:var(--text2)}
.modal-confirm{padding:8px 16px;background:var(--danger);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── Hist filter tabs ── */
.hist-person-filter{display:flex;gap:6px;padding:0 12px;overflow-x:auto;scrollbar-width:none}
.hist-person-filter::-webkit-scrollbar{display:none}
.hpf-chip{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--text2);flex-shrink:0;transition:all .12s}
.hpf-chip.active{background:var(--g2);border-color:var(--g2);color:#fff}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>EBD Jovens</h1>
      <p>Sistema de Pontuação</p>
    </div>
    <span class="trimester-badge">2º Trim 2026</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('home')" id="tab-home">
    <span class="tab-icon">🏠</span>Início
  </button>
  <button class="tab" onclick="showTab('add')" id="tab-add">
    <span class="tab-icon">➕</span>Pontos
  </button>
  <button class="tab" onclick="showTab('hist')" id="tab-hist">
    <span class="tab-icon">📊</span>Histórico
  </button>
  <button class="tab" onclick="showTab('config')" id="tab-config">
    <span class="tab-icon">⚙️</span>Config
  </button>
</div>

<div class="screens">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="summary-bar" id="summary-bar"></div>
    <div class="section-label">Ranking</div>
    <div class="rank-list" id="rank-list"></div>
    <button class="fab" onclick="showTab('add')">➕ Adicionar Pontos</button>
  </div>

  <!-- ADD POINTS -->
  <div class="screen" id="screen-add">
    <div class="toast" id="toast"></div>
    <div class="section-label">Selecione o jovem</div>
    <div class="young-section" id="young-list"></div>
    <div class="section-label">Selecione a ação</div>
    <div class="action-grid" id="action-grid"></div>
    <div class="hint-text" id="hint-text">⬆ Selecione um jovem para habilitar as ações</div>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-hist">
    <div class="section-label" style="padding-bottom:8px">Filtros</div>
    <div class="hist-controls">
      <select class="hist-filter" id="hist-person-select" onchange="renderHist()">
        <option value="">Todos os jovens</option>
      </select>
      <button class="export-btn" onclick="exportCSV()">📥 Excel</button>
    </div>
    <div class="hist-person-filter" id="hist-chips" style="margin-top:8px"></div>
    <div class="table-wrap" id="hist-table-wrap"></div>
  </div>

  <!-- CONFIG -->
  <div class="screen" id="screen-config">
    <div class="section-label">Valores dos pontos</div>
    <div class="config-section" id="pts-config"></div>
    <div class="section-label">Jovens cadastrados</div>
    <div class="config-section" id="youth-config"></div>
    <div class="add-row">
      <input class="add-input" id="new-youth-input" placeholder="Nome do jovem..." onkeydown="if(event.key==='Enter')addYouth()"/>
      <button class="add-btn" onclick="addYouth()">Adicionar</button>
    </div>
    <button class="reset-btn" onclick="confirmReset()">🗑 Zerar pontuação de todos</button>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Zerar pontuação?</h3>
    <p>Isso apaga todos os pontos e o histórico completo. Esta ação não pode ser desfeita.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-confirm" onclick="resetAll()">Zerar tudo</button>
    </div>
  </div>
</div>

<script>
// ── Default data ──────────────────────────────────────────────────────────
const DEFAULT_ACTIONS = [
  {id:'presenca',     name:'Presença',     icon:'🙋', pts:5},
  {id:'participacao', name:'Participação', icon:'✋', pts:5},
  {id:'biblia',       name:'Bíblia',       icon:'📖', pts:5},
  {id:'caderno',      name:'Caderno',      icon:'📓', pts:5},
  {id:'pergunta',     name:'Pergunta',     icon:'❓', pts:5},
  {id:'visitante',    name:'Visitante',    icon:'👤', pts:10},
  {id:'oferta',       name:'Oferta',       icon:'💚', pts:3},
];
const DEFAULT_YOUTHS = ['Alif','Bruno','Carla','Daniel','Érica','Felipe','Gabi','Hugo'];

// ── Storage ───────────────────────────────────────────────────────────────
const load = (k,d) => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d} };
const save = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v))}catch{} };

let actions  = load('ebd_actions',  DEFAULT_ACTIONS);
let youths   = load('ebd_youths',   DEFAULT_YOUTHS);
let scores   = load('ebd_scores',   {});
let history  = load('ebd_history',  []);
let selectedYouth = null;
let histFilter = '';

const saveAll = () => {
  save('ebd_actions', actions);
  save('ebd_youths',  youths);
  save('ebd_scores',  scores);
  save('ebd_history', history);
};

const getScore = n => scores[n] || 0;

// ── Tab navigation ────────────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='hist')  renderHist();
  if(id==='config') renderConfig();
  if(id==='home')   renderHome();
}

// ── HOME ──────────────────────────────────────────────────────────────────
function renderHome() {
  const sorted = [...youths].sort((a,b) => getScore(b)-getScore(a));
  const maxScore = sorted.length ? getScore(sorted[0]) : 1;
  const total = youths.reduce((s,y) => s+getScore(y), 0);

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-card"><div class="val">${youths.length}</div><div class="lbl">Jovens</div></div>
    <div class="summary-card"><div class="val">${total}</div><div class="lbl">Pontos</div></div>
    <div class="summary-card"><div class="val">${history.length}</div><div class="lbl">Registros</div></div>
  `;

  if(!sorted.length) {
    document.getElementById('rank-list').innerHTML = '<div class="empty-state"><div class="e-icon">👥</div><p>Nenhum jovem cadastrado</p><small>Adicione jovens em Configurações</small></div>';
    return;
  }

  document.getElementById('rank-list').innerHTML = sorted.map((name, i) => {
    const pts = getScore(name);
    const pct = maxScore > 0 ? Math.round((pts/maxScore)*100) : 0;
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':null;
    const badgeClass = i===0?'b1':i===1?'b2':i===2?'b3':'bn';
    const cardClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    const actions_count = history.filter(h=>h.youth===name).length;
    return `<div class="rank-card ${cardClass}">
      <div class="rank-badge ${badgeClass}">${medal || (i+1)}</div>
      <div class="rank-info">
        <div class="rank-name">${name}</div>
        <div class="rank-bar-bg"><div class="rank-bar" style="width:${pct}%"></div></div>
        <div class="rank-actions">${actions_count} ação${actions_count!==1?'ões':''}</div>
      </div>
      <div class="rank-score">${pts}</div>
    </div>`;
  }).join('');
}

// ── ADD POINTS ────────────────────────────────────────────────────────────
function renderAdd() {
  document.getElementById('young-list').innerHTML = youths.map(name => `
    <button class="young-btn ${selectedYouth===name?'selected':''}" onclick="selectYouth('${name.replace(/'/g,"\\'")}')">
      <span>${name}</span>
      <span class="pts-badge">${getScore(name)} pts</span>
    </button>
  `).join('');

  const disabled = !selectedYouth ? 'disabled' : '';
  document.getElementById('action-grid').innerHTML = actions.map(a => `
    <div class="action-card ${disabled}" onclick="addPoints('${a.id}')">
      <span class="a-icon">${a.icon}</span>
      <span class="a-name">${a.name}</span>
      <span class="a-pts">+${a.pts} pts</span>
    </div>
  `).join('');

  document.getElementById('hint-text').style.display = selectedYouth ? 'none' : 'block';
}

function selectYouth(name) {
  selectedYouth = name;
  renderAdd();
}

function addPoints(actionId) {
  if(!selectedYouth) return;
  const action = actions.find(a => a.id === actionId);
  if(!action) return;
  scores[selectedYouth] = getScore(selectedYouth) + action.pts;
  const now = new Date();
  history.push({
    youth: selectedYouth,
    action: actionId,
    actionName: action.name,
    actionIcon: action.icon,
    pts: action.pts,
    date: now.toLocaleDateString('pt-BR'),
    time: now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
    ts: now.getTime()
  });
  saveAll();
  showToast(`${action.icon} +${action.pts} pts adicionados para ${selectedYouth}`);
  renderAdd();
  renderHome();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── HISTORY ───────────────────────────────────────────────────────────────
function renderHist() {
  const select = document.getElementById('hist-person-select');
  // Update select options
  const currentVal = select.value;
  select.innerHTML = '<option value="">Todos os jovens</option>' +
    youths.map(y => `<option value="${y}" ${currentVal===y?'selected':''}>${y}</option>`).join('');

  // Chips
  document.getElementById('hist-chips').innerHTML =
    ['', ...youths].map(y => `
      <button class="hpf-chip ${histFilter===y?'active':''}" onclick="setHistFilter('${y.replace(/'/g,"\\'")}')">
        ${y || 'Todos'}
      </button>
    `).join('');

  const filterPerson = histFilter || select.value;
  let filtered = [...history].reverse();
  if(filterPerson) filtered = filtered.filter(h => h.youth === filterPerson);

  const wrap = document.getElementById('hist-table-wrap');
  if(!filtered.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="e-icon">📊</div><p>Nenhum registro encontrado</p><small>${filterPerson ? 'Tente selecionar outro jovem' : 'Adicione pontos na aba ➕'}</small></div>`;
    return;
  }

  wrap.innerHTML = `
    <table class="hist-table">
      <thead>
        <tr>
          <th>Data</th>
          <th>Hora</th>
          <th>Jovem</th>
          <th>Ação</th>
          <th>Pts</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(h => `
          <tr>
            <td class="time-cell">${h.date}</td>
            <td class="time-cell">${h.time}</td>
            <td><strong>${h.youth}</strong></td>
            <td>${h.actionIcon} ${h.actionName}</td>
            <td class="pts-cell">+${h.pts}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function setHistFilter(name) {
  histFilter = name;
  renderHist();
}

function exportCSV() {
  const filterPerson = histFilter || document.getElementById('hist-person-select').value;
  let data = [...history].reverse();
  if(filterPerson) data = data.filter(h => h.youth === filterPerson);

  if(!data.length) { alert('Nenhum dado para exportar.'); return; }

  const header = 'Data,Hora,Jovem,Ação,Pontos\n';
  const rows = data.map(h => `${h.date},${h.time},"${h.youth}","${h.actionName}",${h.pts}`).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + header + rows], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `EBD_Historico_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── CONFIG ────────────────────────────────────────────────────────────────
function renderConfig() {
  document.getElementById('pts-config').innerHTML = actions.map((a,i) => `
    <div class="config-row">
      <span class="cr-icon">${a.icon}</span>
      <span class="cr-label">${a.name}</span>
      <input class="pts-input" type="number" min="0" max="99" value="${a.pts}"
        onchange="updateActionPts('${a.id}', this.value)"/>
    </div>
  `).join('');

  document.getElementById('youth-config').innerHTML = youths.length
    ? youths.map((name, i) => `
        <div class="youth-row" id="yr-${i}">
          <span class="yr-name">${name}</span>
          <span class="yr-pts">${getScore(name)} pts</span>
          <button class="del-btn" onclick="removeYouth(${i})">✕</button>
        </div>
      `).join('')
    : '<div style="padding:12px 14px;font-size:13px;color:var(--text3)">Nenhum jovem cadastrado</div>';
}

function updateActionPts(id, val) {
  const a = actions.find(a => a.id === id);
  if(a) a.pts = parseInt(val) || 0;
  saveAll();
}

function addYouth() {
  const inp = document.getElementById('new-youth-input');
  const name = inp.value.trim();
  if(!name || youths.includes(name)) return;
  youths.push(name);
  saveAll();
  inp.value = '';
  renderConfig();
  renderHome();
  renderAdd();
}

function removeYouth(idx) {
  const name = youths[idx];
  if(!confirm(`Remover "${name}"?`)) return;
  youths.splice(idx, 1);
  delete scores[name];
  if(selectedYouth === name) selectedYouth = null;
  saveAll();
  renderConfig();
  renderHome();
  renderAdd();
}

function confirmReset() {
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
function resetAll() {
  scores = {};
  history = [];
  saveAll();
  closeModal();
  renderHome();
  renderAdd();
  renderHist();
  renderConfig();
}

// ── Init ──────────────────────────────────────────────────────────────────
renderHome();
renderAdd();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}</script>
